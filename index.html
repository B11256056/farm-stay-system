<button onclick="getAnalysis(event)" id="analyzeBtn" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600 disabled:bg-gray-400">
    產生 AI 經營分析
</button>

<script>
    async function getAnalysis(e) {
        if (e) e.preventDefault(); // 避免非同步通訊中斷

        const btn = document.getElementById('analyzeBtn');
        const resultDiv = document.getElementById('result');
        const textElement = document.getElementById('analysisText');
        
        btn.disabled = true;
        btn.innerText = "分析中...";
        resultDiv.classList.add('hidden'); 

        try {
            // 使用絕對路徑確保在任何測試環境都能抓到你的 Vercel 後端
            const res = await fetch('https://farm-stay-system-h9dd.vercel.app/api/analyze', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            
            const data = await res.json();
            resultDiv.classList.remove('hidden');
            
            // 你的邏輯非常棒，這裡完美對接
            if (data.advice) {
                textElement.innerText = data.advice;
            } else if (data.error) {
                textElement.innerText = "出錯了：" + data.error;
            } else {
                textElement.innerText = "格式不符，請檢查主控台。";
                console.log(data);
            }
        } catch (error) {
            resultDiv.classList.remove('hidden');
            textElement.innerText = "無法連線：" + error.message;
        } finally {
            btn.disabled = false;
            btn.innerText = "產生 AI 經營分析";
        }
    }
</script>
