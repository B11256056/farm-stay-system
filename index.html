<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>農場民宿收支登錄系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gradient-to-br from-green-50 to-amber-50 min-h-screen p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <!-- 標題 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-green-800 mb-2">🌾 農場民宿收支登錄</h1>
            <p class="text-gray-600">簡單記錄您的收支，AI 幫您分析經營策略</p>
        </div>

        <!-- 新增記錄表單 -->
        <div class="bg-white p-6 rounded-xl shadow-lg mb-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">➕ 新增收支記錄</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">收支類型</label>
                    <select id="type" class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                        <option value="income">💰 收入</option>
                        <option value="expense">💸 支出</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">部門分類</label>
                    <select id="category" class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                        <option value="農產">🌿 農產部門</option>
                        <option value="民宿">🏠 民宿部門</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">摘要說明</label>
                    <input id="note" type="text" placeholder="例如：賣蜂蜜、入住費用、肥料支出" class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">金額（元）</label>
                    <input id="amount" type="number" placeholder="請輸入金額" min="0" class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500">
                </div>
            </div>
            <button onclick="addTransaction()" class="w-full mt-4 bg-green-600 text-white p-3 rounded-lg hover:bg-green-700 font-medium transition">📝 登錄記錄</button>
        </div>

        <!-- 記錄列表 -->
        <div class="bg-white p-6 rounded-xl shadow-lg mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800">📋 最新記錄</h2>
                <button onclick="clearAllRecords()" class="text-sm text-red-500 hover:text-red-700">🗑️ 清除全部</button>
            </div>
            <div id="recordsList" class="space-y-3 max-h-96 overflow-y-auto">
                <p class="text-gray-400 text-center py-8">載入中...</p>
            </div>
        </div>

        <!-- 總覽卡片 -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-green-50 p-4 rounded-xl border border-green-200">
                <p class="text-sm text-green-600 mb-1">總收入</p>
                <p id="totalIncome" class="text-2xl font-bold text-green-700">$0</p>
            </div>
            <div class="bg-red-50 p-4 rounded-xl border border-red-200">
                <p class="text-sm text-red-600 mb-1">總支出</p>
                <p id="totalExpense" class="text-2xl font-bold text-red-700">$0</p>
            </div>
        </div>

        <!-- AI 分析區塊 -->
        <div class="bg-white p-6 rounded-xl shadow-lg">
            <h2 class="text-xl font-bold text-gray-800 mb-4">🤖 AI 經營分析</h2>
            <button onclick="getAnalysis()" id="analyzeBtn" class="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 disabled:bg-gray-400 font-medium transition">🔮 產生 AI 經營分析</button>
            <div id="result" class="mt-4 p-4 bg-blue-50 border-l-4 border-blue-500 rounded-lg hidden">
                <h3 class="font-bold text-blue-800">AI 智慧建議：</h3>
                <p id="analysisText" class="text-sm text-gray-700 mt-2 whitespace-pre-wrap"></p>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300">
        <span id="toastMessage"></span>
    </div>

    <script>
        // Firebase 配置 - 您的實際設定
        const firebaseConfig = {
            apiKey: "AIzaSyAIfcQX52BTG8oUKNOO32sDdgQuxhf_a8c",
            authDomain: "farm-stay-system.firebaseapp.com",
            projectId: "farm-stay-system",
            storageBucket: "farm-stay-system.firebasestorage.app",
            messagingSenderId: "918757131924",
            appId: "1:918757131924:web:f0c86c34aaf12dc8105681"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 讀取 LocalStorage 中的記錄（作為備份）
        let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');

        // 顯示提示訊息
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg transform transition-all duration-300 ${isError ? 'bg-red-600' : 'bg-green-600'} text-white`;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // 從 Firebase 載入資料
        async function loadFromFirebase() {
            try {
                const snapshot = await db.collection('transactions').orderBy('date', 'desc').limit(50).get();
                if (!snapshot.empty) {
                    transactions = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        transactions.push({
                            id: doc.id,
                            type: data.type,
                            category: data.category,
                            note: data.note,
                            amount: parseInt(data.amount) || 0,
                            date: data.date || new Date().toISOString()
                        });
                    });
                    // 也存入 LocalStorage 作為備份
                    localStorage.setItem('transactions', JSON.stringify(transactions));
                }
                renderRecords();
                updateTotals();
            } catch (error) {
                console.error('載入 Firebase 失敗:', error);
                // 如果 Firebase 失敗，使用 LocalStorage
                renderRecords();
                updateTotals();
            }
        }

        // 新增收支記錄（寫入 Firebase + LocalStorage）
        async function addTransaction() {
            const type = document.getElementById('type').value;
            const category = document.getElementById('category').value;
            const note = document.getElementById('note').value.trim();
            const amount = parseInt(document.getElementById('amount').value);

            if (!note) {
                showToast('請輸入摘要說明', true);
                return;
            }
            if (!amount || amount <= 0) {
                showToast('請輸入有效的金額', true);
                return;
            }

            const transaction = {
                type,
                category,
                note,
                amount,
                date: new Date().toISOString()
            };

            try {
                // 寫入 Firebase
                const docRef = await db.collection('transactions').add(transaction);

                // 也寫入 LocalStorage
                transaction.id = docRef.id;
                transactions.unshift(transaction);
                localStorage.setItem('transactions', JSON.stringify(transactions));

                saveAndRender();
                showToast('記錄已成功登錄！');

                // 清空表單
                document.getElementById('note').value = '';
                document.getElementById('amount').value = '';
            } catch (error) {
                console.error('寫入 Firebase 失敗:', error);
                showToast('寫入失敗，請稍後再試', true);
            }
        }

        // 刪除單筆記錄（從 Firebase + LocalStorage）
        async function deleteRecord(id) {
            try {
                // 從 Firebase 刪除
                await db.collection('transactions').doc(id).delete();

                // 從本地陣列移除
                transactions = transactions.filter(t => t.id !== id);
                localStorage.setItem('transactions', JSON.stringify(transactions));

                saveAndRender();
                showToast('記錄已刪除');
            } catch (error) {
                console.error('刪除失敗:', error);
                showToast('刪除失敗，請稍後再試', true);
            }
        }

        // 清除全部記錄（從 Firebase + LocalStorage）
        async function clearAllRecords() {
            if (!confirm('確定要清除所有記錄嗎？此操作無法復原。')) {
                return;
            }

            try {
                // 從 Firebase 刪除所有記錄
                const batch = db.batch();
                const snapshot = await db.collection('transactions').get();
                snapshot.forEach(doc => {
                    batch.delete(doc.ref);
                });
                await batch.commit();

                // 清除本地
                transactions = [];
                localStorage.setItem('transactions', JSON.stringify(transactions));

                saveAndRender();
                showToast('所有記錄已清除');
            } catch (error) {
                console.error('清除失敗:', error);
                showToast('清除失敗，請稍後再試', true);
            }
        }

        // 儲存並渲染畫面
        function saveAndRender() {
            renderRecords();
            updateTotals();
        }

        // 渲染記錄列表
        function renderRecords() {
            const list = document.getElementById('recordsList');

            if (transactions.length === 0) {
                list.innerHTML = '<p class="text-gray-400 text-center py-8">尚無記錄</p>';
                return;
            }

            list.innerHTML = transactions.slice(0, 10).map(t => `
                <div class="flex items-center justify-between p-3 rounded-lg ${t.type === 'income' ? 'bg-green-50 border-l-4 border-green-500' : 'bg-red-50 border-l-4 border-red-500'}">
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <span class="font-medium">${t.note}</span>
                            <span class="text-xs px-2 py-0.5 rounded ${t.category === '農產' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${t.category}</span>
                        </div>
                        <div class="text-sm text-gray-500">${new Date(t.date).toLocaleString('zh-TW')}</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-bold ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}">
                            ${t.type === 'income' ? '+' : '-'}$${t.amount}
                        </span>
                        <button onclick="deleteRecord('${t.id}')" class="text-gray-400 hover:text-red-500">✕</button>
                    </div>
                </div>
            `).join('');
        }

        // 更新總計
        function updateTotals() {
            const income = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const expense = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            document.getElementById('totalIncome').textContent = `$${income.toLocaleString()}`;
            document.getElementById('totalExpense').textContent = `$${expense.toLocaleString()}`;
        }

        // AI 分析功能（從 Firebase 讀取資料）
        async function getAnalysis() {
            const btn = document.getElementById('analyzeBtn');
            const resultDiv = document.getElementById('result');
            const textElement = document.getElementById('analysisText');

            if (transactions.length === 0) {
                showToast('請先新增收支記錄再進行分析', true);
                return;
            }

            btn.disabled = true;
            btn.innerText = "🤖 AI 分析中...";
            resultDiv.classList.add('hidden');

            try {
                const res = await fetch('https://farm-stay-system-h9dd.vercel.app/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await res.json();
                resultDiv.classList.remove('hidden');

                if (data.advice) {
                    textElement.innerText = data.advice;
                } else {
                    textElement.innerText = "收到回傳但格式異常，請稍後再試。";
                }
            } catch (error) {
                resultDiv.classList.remove('hidden');
                textElement.innerText = "網路連線失敗，請檢查網路後再試。";
            } finally {
                btn.disabled = false;
                btn.innerText = "🔮 產生 AI 經營分析";
            }
        }

        // 初始載入（從 Firebase）
        loadFromFirebase();
    </script>

  function handleMouseOut(e) {
    if (!highlightEnabled) return;
    var relatedTarget = e.relatedTarget;

    // 如果鼠标移动到高亮相关元素上，不隐藏高亮
    if (relatedTarget && (relatedTarget === highlightBox || relatedTarget === tagLabel || relatedTarget === overlay || relatedTarget === selectedBox || relatedTarget === selectedLabel)) {
      return;
    }
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    try {
      window.parent.postMessage({
        type: "iframe-element-hover",
        data: null,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 点击事件处理
  function handleClick(e) {
    var target = e.target;
    if (!target || target === overlay || target === highlightBox || target === tagLabel || target === selectedBox || target === selectedLabel) {
      return;
    }

    // 避免处理 html 和 body 元素
    if (target === document.documentElement || target === document.body) {
      return;
    }

    // 检查是否是交互元素，这些元素需要保留默认行为
    var isInteractiveElement = ['input', 'textarea', 'select', 'button', 'a'].includes(target.tagName.toLowerCase());

    // 如果高亮功能启用，对于非交互元素阻止默认行为和事件传播
    if (highlightEnabled) {
      e.preventDefault();
      e.stopPropagation();
    }
    var rect = target.getBoundingClientRect();
    var selector = getElementSelector(target);
    var text = getElementText(target);
    var attributes = getElementAttributes(target);
    console.log("Element clicked:", {
      tagName: target.tagName,
      selector: selector,
      rect: rect
    });

    // 立即更新选中高亮
    updateSelectedHighlight(target);

    // 隐藏悬停高亮，因为现在是选中状态
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    var elementInfo = {
      tagName: target.tagName.toLowerCase(),
      rect: {
        left: rect.left,
        top: rect.top,
        right: rect.right,
        bottom: rect.bottom,
        width: rect.width,
        height: rect.height,
        x: rect.x,
        y: rect.y
      },
      selector: selector,
      text: text,
      attributes: attributes,
      url: window.location.href,
      path: window.location.pathname,
      timestamp: Date.now()
    };
    try {
      window.parent.postMessage({
        type: "iframe-element-click",
        data: elementInfo,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 监听来自父窗口的消息
  function handleParentMessage(event) {
    console.log("Received message from parent:", event.data);
    if (event.data.type === "iframe-highlight-toggle") {
      var enabled = event.data.enabled;
      console.log("Highlight toggle:", enabled);
      if (enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "enable-iframe-highlight") {
      console.log("Enable iframe highlight");
      enableHighlight();
    } else if (event.data.type === "disable-iframe-highlight") {
      console.log("Disable iframe highlight");
      disableHighlight();
    } else if (event.data.type === "toggle-iframe-highlight") {
      var _enabled = event.data.enabled !== undefined ? event.data.enabled : !highlightEnabled;
      console.log("Toggle iframe highlight to:", _enabled);
      if (_enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "update-selected-element") {
      var selector = event.data.selector;
      console.log("Update selected element with selector:", selector);
      if (selector) {
        try {
          var element = document.querySelector(selector);
          console.log("Found element by selector:", element);
          updateSelectedHighlight(element);
        } catch (error) {
          console.warn("Failed to select element:", error);
          updateSelectedHighlight(null);
        }
      } else {
        updateSelectedHighlight(null);
      }
    } else if (event.data.type === "clear-selected-element") {
      console.log("Clear selected element");
      updateSelectedHighlight(null);
    }
  }

  // 启用高亮功能
  function enableHighlight() {
    console.log("Enabling highlight");
    document.addEventListener("mouseover", handleMouseOver, true);
    document.addEventListener("mouseout", handleMouseOut, true);
    document.addEventListener("click", handleClick, true);
    highlightEnabled = true;
    overlay.style.display = "block";
  }

  // 禁用高亮功能
  function disableHighlight() {
    console.log("Disabling highlight");
    highlightEnabled = false;
    // 保持事件监听器，但通过 highlightEnabled 变量控制行为
    // 这样可以保留选中状态的显示
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    // 不隐藏 selectedBox 和 selectedLabel，保留选中状态
  }

  // 完全禁用高亮功能（移除所有监听器）
  function fullyDisableHighlight() {
    console.log("Fully disabling highlight");
    highlightEnabled = false;
    document.removeEventListener("mouseover", handleMouseOver, true);
    document.removeEventListener("mouseout", handleMouseOut, true);
    document.removeEventListener("click", handleClick, true);
    overlay.style.display = "none";
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    selectedBox.style.display = "none";
    selectedLabel.style.display = "none";
  }

  // 添加事件监听
  enableHighlight();
  window.addEventListener("message", handleParentMessage);

  // 暴露全局函数供外部调用
  window.__iframeHighlightControl = {
    enable: enableHighlight,
    disable: disableHighlight,
    fullyDisable: fullyDisableHighlight,
    isEnabled: function isEnabled() {
      return highlightEnabled;
    },
    getSelectedElement: function getSelectedElement() {
      return selectedElement;
    },
    updateSelected: updateSelectedHighlight,
    // 通过消息发送开关控制
    sendToggleMessage: function sendToggleMessage(enabled) {
      window.parent.postMessage({
        type: 'iframe-highlight-status',
        enabled: enabled || highlightEnabled,
        source: 'iframe-highlight-injector'
      }, '*');
    }
  };

  // 通知父窗口脚本已加载
  try {
    window.parent.postMessage({
      type: "iframe-highlight-ready",
      data: {
        url: window.location.href,
        userAgent: navigator.userAgent,
        timestamp: Date.now()
      },
      source: "iframe-highlight-injector"
    }, "*");
  } catch (error) {
    console.warn("无法发送就绪消息到父窗口:", error);
  }

  // 清理函数
  window.__iframeHighlightCleanup = function () {
    fullyDisableHighlight();
    window.removeEventListener("message", handleParentMessage);
    if (overlay.parentElement) {
      overlay.parentElement.removeChild(overlay);
    }
    delete window.__iframeHighlightInitialized;
    delete window.__iframeHighlightCleanup;
  };
})();

</script>
